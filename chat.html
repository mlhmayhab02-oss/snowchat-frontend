<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOWCHAT - Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
html,body{height:100%;overflow:hidden;}

body{background:#eef7ff;}

.header{
position:fixed;
top:0;
width:100%;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:#2aa6e8;
background:rgba(255,255,255,.6);
backdrop-filter:blur(20px);
}

.chat{
position:absolute;
top:60px;
bottom:78px;
width:100%;
overflow:auto;
padding:15px;
}

.msg{
background:white;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
height:78px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(255,255,255,.72);
backdrop-filter:blur(25px);
border-top:1px solid rgba(42,166,232,.15);
box-shadow:0 -10px 30px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
font-size:20px;
opacity:.55;
cursor:pointer;
padding:10px 14px;
border-radius:16px;
transition:.25s;
min-width:70px;
}

.nav-item i{font-size:20px;}
.nav-item span{font-size:11px;font-weight:600;}

.nav-item.active{
opacity:1;
color:#2aa6e8;
background:rgba(42,166,232,.10);
transform:translateY(-6px);
box-shadow:0 6px 18px rgba(42,166,232,.2);
}

</style>
</head>

<body>

<div class="header">💬 Chat</div>

<div class="chat">
<div class="msg">مرحبا 👋</div>
<div class="msg">SNOWCHAT Chat</div>
</div>

<div class="nav">

<div class="nav-item" onclick="go('home.html')">
<i class="fa-solid fa-house"></i><span>Home</span>
</div>

<div class="nav-item active">
<i class="fa-solid fa-comments"></i><span>Chat</span>
</div>

<div class="nav-item" onclick="go('online.html')">
<i class="fa-solid fa-signal"></i><span>Online</span>
</div>

<div class="nav-item" onclick="go('profile.html')">
<i class="fa-solid fa-user"></i><span>Profile</span>
</div>

</div>

<script>
function go(p){
window.location.href = window.location.origin + "/" + p;
}
</script>

</body>
</html>
