<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOWCHAT - Home</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
html,body{height:100%;overflow:hidden;}

body{
background:linear-gradient(180deg,#f5fbff,#e3f4ff);
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:#2aa6e8;
background:rgba(255,255,255,.6);
backdrop-filter:blur(20px);
}

/* CONTENT */
.content{
position:absolute;
top:60px;
bottom:78px;
width:100%;
overflow:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,.7);
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
height:78px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(255,255,255,.72);
backdrop-filter:blur(25px);
border-top:1px solid rgba(42,166,232,.15);
box-shadow:0 -10px 30px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
font-size:20px;
opacity:.55;
cursor:pointer;
padding:10px 14px;
border-radius:16px;
transition:.25s;
min-width:70px;
}

.nav-item i{font-size:20px;}
.nav-item span{font-size:11px;font-weight:600;}

.nav-item.active{
opacity:1;
color:#2aa6e8;
background:rgba(42,166,232,.10);
transform:translateY(-6px);
box-shadow:0 6px 18px rgba(42,166,232,.2);
}

/* ❄️ MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(10,20,40,0.35);
backdrop-filter:blur(12px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-card{
width:320px;
padding:22px;
border-radius:22px;
background:linear-gradient(145deg,
rgba(255,255,255,0.75),
rgba(210,240,255,0.35)
);
backdrop-filter:blur(25px);
text-align:center;
box-shadow:
0 25px 60px rgba(0,0,0,0.15),
inset 0 0 20px rgba(255,255,255,0.4);
border:1px solid rgba(255,255,255,0.4);
animation:popIn .45s ease;
position:relative;
overflow:hidden;
}

/* shine */
.modal-card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transform:rotate(25deg);
animation:shine 3s linear infinite;
}

.modal-card h2{color:#2aa6e8;margin-bottom:8px;}
.modal-card p{font-size:13px;margin-bottom:18px;color:#2c3e50;opacity:0.85;}

/* زر احترافي */
.modal-card button{
position:relative;
overflow:hidden;
padding:12px 20px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#2aa6e8,#6fd3ff);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 25px rgba(42,166,232,0.3);
transition:0.2s;
}

.modal-card button:active{
transform:scale(0.97);
}

/* spinner */
.spinner{
display:inline-block;
width:14px;
height:14px;
border:2px solid rgba(255,255,255,0.4);
border-top-color:white;
border-radius:50%;
margin-left:8px;
animation:spin 0.7s linear infinite;
vertical-align:middle;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

@keyframes popIn{
from{transform:scale(0.85) translateY(20px);opacity:0;}
to{transform:scale(1) translateY(0);opacity:1;}
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

</style>
</head>

<body>

<div class="header">🏠 Home</div>

<div class="content">
<div class="card">أهلاً بك في SNOWCHAT ❄️</div>
<div class="card">Feed</div>
</div>

<div class="nav">

<div class="nav-item active">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</div>

<div class="nav-item" onclick="go('chat.html')">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item" onclick="go('online.html')">
<i class="fa-solid fa-signal"></i>
<span>Online</span>
</div>

<div class="nav-item" onclick="go('profile.html')">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</div>

</div>

<!-- ❄️ MODAL -->
<div id="profileModal" class="modal">
  <div class="modal-card">
    <h2>أكمل ملفك الشخصي</h2>
    <p>يجب إكمال إعداد الملف الشخصي قبل استخدام SNOWCHAT</p>

    <button id="profileBtn" onclick="goProfile(event)">
      إكمال الآن
    </button>
  </div>
</div>

<script>

function go(p){
window.location.href = window.location.origin + "/" + p;
}

/* زر احترافي جداً */
function goProfile(e){

const btn = document.getElementById("profileBtn");
const card = document.querySelector(".modal-card");

/* ripple effect */
const ripple = document.createElement("span");
ripple.style.position="absolute";
ripple.style.width="20px";
ripple.style.height="20px";
ripple.style.background="rgba(255,255,255,0.6)";
ripple.style.borderRadius="50%";
ripple.style.transform="scale(0)";
ripple.style.animation="ripple 0.6s linear";
ripple.style.left=(e.offsetX)+"px";
ripple.style.top=(e.offsetY)+"px";
btn.appendChild(ripple);
setTimeout(()=>ripple.remove(),600);

/* state */
btn.innerHTML = 'جاري التحويل <span class="spinner"></span>';
btn.disabled = true;

/* card feedback */
card.style.transform = "scale(0.98)";
card.style.transition = "0.2s";

/* انتقال */
setTimeout(()=>{
window.location.href = "profile.html";
}, 900);

}

/* عرض المودال */
document.addEventListener("DOMContentLoaded", function(){
document.getElementById("profileModal").style.display="flex";
});

/* ripple keyframes */
const style = document.createElement("style");
style.innerHTML = `
@keyframes ripple {
to {
transform: scale(10);
opacity: 0;
}
}`;
document.head.appendChild(style);

</script>

</body>
</html>
